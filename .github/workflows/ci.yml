name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26

    defaults:
      run:
        shell: bash
        working-directory: Gridflow

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build Gridflow
        env:
          SWIFTPM_MODULECACHE_OVERRIDE: ${{ github.workspace }}/Gridflow/.build/module-cache
          CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/Gridflow/.build/clang-module-cache
        run: swift build --disable-sandbox --scratch-path "$PWD/.build/swiftpm" -c release
